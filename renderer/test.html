<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css" />
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #1e1e1e; display: flex; flex-direction: column; }
    #status { color: lime; font-family: monospace; padding: 8px; font-size: 12px; background: #333; }
    #terminal-wrap { flex: 1; min-height: 0; position: relative; }
    #terminal-wrap .xterm { height: 100%; }
  </style>
</head>
<body>
  <div id="status">Initialisiere...</div>
  <div id="terminal-wrap"></div>
  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script>
    const s = document.getElementById('status')
    s.textContent = 'Terminal: ' + typeof window.Terminal + ' | FitAddon: ' + typeof window.FitAddon

    const t = new window.Terminal({ theme: { background: '#1e1e1e', foreground: '#cccccc' }, cursorBlink: true })
    const fit = new window.FitAddon()
    t.loadAddon(fit)
    t.open(document.getElementById('terminal-wrap'))
    fit.fit()
    t.write('Hello from xterm.js! Alles funktioniert.\r\n')
    s.textContent += ' | TERMINAL OK cols=' + t.cols + ' rows=' + t.rows
  </script>
</body>
</html>
