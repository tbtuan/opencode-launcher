<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>OpenCode Launcher</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css" />
</head>
<body>

  <!-- Tab bar (immer sichtbar) -->
  <div id="tab-bar">
    <!-- Pinned Home-Tab -->
    <div id="tab-home" class="tab tab-pinned active" data-id="home" title="Home">
      <span class="tab-home-icon">&#8962;</span>
      <span class="tab-label" data-i18n="tab.home">Home</span>
    </div>
    <div id="tabs-container"></div>
    <button id="btn-add-tab" data-i18n-title="tab.newTerminal" title="Neues Terminal">+</button>
  </div>

  <!-- Inhalt-Bereich -->
  <div id="content-area">

    <!-- Dashboard (Home-Tab Inhalt) -->
    <div id="dashboard" class="content-pane active">
      <div id="dashboard-header">
        <h1>OpenCode Launcher</h1>
        <div id="dashboard-header-actions">
          <span id="models-last-loaded"></span>
          <div id="actions-menu">
            <button id="btn-actions"><span data-i18n="actions.title">Aktionen</span> &#9662;</button>
            <div id="actions-dropdown" class="hidden">
              <button id="act-reload-models" data-i18n="actions.reloadModels">&#8635; Modelle neu laden</button>
              <button id="act-restart-launcher" data-i18n="actions.restartLauncher">&#8635; OpenCode Launcher neustarten</button>
              <hr />
              <button id="act-settings" data-i18n="actions.settings">&#9881; Einstellungen</button>
            </div>
          </div>
          <button id="btn-add-directory" data-i18n="dashboard.addDirectory">+ Verzeichnis hinzufügen</button>
        </div>
      </div>
      <div id="cards-grid"></div>
      <div id="no-dirs" class="hidden">
        <div class="no-dirs-icon">&#128193;</div>
        <div class="no-dirs-text" data-i18n="dashboard.noDirs">Noch keine Verzeichnisse</div>
        <div class="no-dirs-hint" data-i18n-html="dashboard.noDirsHint">Klicke auf <strong>+ Verzeichnis hinzufügen</strong></div>
      </div>

      <div id="preview-section" class="hidden">
        <div id="preview-header">
          <span id="preview-section-title" data-i18n="preview.title">Laufende Terminals</span>
        </div>
        <div id="preview-grid"></div>
      </div>
    </div>

    <!-- Terminal-Panes werden per JS eingefügt (.content-pane) -->

  </div>

  <!-- Context menu -->
  <div id="context-menu" class="hidden">
    <button id="ctx-rename" data-ctx="tab" data-i18n="ctx.rename">Umbenennen</button>
    <button id="ctx-change-dir" data-ctx="tab" data-i18n="ctx.changeDir">Verzeichnis ändern</button>
    <button id="ctx-restart" data-ctx="tab" data-i18n="ctx.restart">Neustart</button>
    <hr data-ctx="tab" />
    <button id="ctx-close" class="danger" data-ctx="tab" data-i18n="ctx.closeTab">Tab schließen</button>
    <hr data-ctx="card" class="hidden" />
    <button id="ctx-delete-card" class="danger hidden" data-ctx="card" data-i18n="ctx.removeCard">Kachel entfernen</button>
  </div>

  <!-- Speichern-Dialog -->
  <div id="save-dialog-overlay" class="hidden">
    <div id="save-dialog">
      <div id="save-dialog-title" data-i18n="saveDialog.title">Verzeichnis speichern?</div>
      <div id="save-dialog-path"></div>
      <div id="save-dialog-name-row">
        <label data-i18n="saveDialog.name">Name:</label>
        <input id="save-dialog-name" type="text" />
      </div>
      <div id="save-dialog-buttons">
        <button id="save-dialog-yes" data-i18n="saveDialog.saveAndOpen">Speichern &amp; Öffnen</button>
        <button id="save-dialog-save-only" data-i18n="saveDialog.saveOnly">Nur speichern</button>
        <button id="save-dialog-no" data-i18n="saveDialog.openOnly">Nur öffnen</button>
        <button id="save-dialog-cancel" data-i18n="saveDialog.cancel">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- Settings Dialog -->
  <div id="settings-dialog-overlay" class="hidden">
    <div id="settings-dialog">
      <div id="settings-dialog-title" data-i18n="settings.title">Standard-Tab beim Start</div>
      <div id="settings-dialog-options"></div>
      <div id="settings-dialog-buttons">
        <button id="settings-dialog-save" data-i18n="settings.save">Speichern</button>
        <button id="settings-dialog-cancel" data-i18n="settings.cancel">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- Restart dialog -->
  <div id="restart-dialog-overlay" class="hidden">
    <div id="restart-dialog">
      <div id="restart-dialog-title" data-i18n="restartDialog.title">Sprache ändern</div>
      <div id="restart-dialog-text" data-i18n-html="restartDialog.message">Die Sprache wird erst nach einem Neustart übernommen.<br>Jetzt neustarten?</div>
      <div id="restart-dialog-buttons">
        <button id="restart-dialog-yes" data-i18n="restartDialog.restart">Neu starten</button>
        <button id="restart-dialog-no" data-i18n="restartDialog.later">Später</button>
      </div>
    </div>
  </div>

  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
